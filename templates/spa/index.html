{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Процедурний кабінет - REST API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#/">Процедурний кабінет</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#/">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="#/patients">Пацієнти</a></li>
                    <li class="nav-item"><a class="nav-link" href="#/requests">Заявки</a></li>
                    <li class="nav-item"><a class="nav-link" href="#/appointments">Прийоми</a></li>
                    
                    {% if user.is_staff or user.is_superuser %}
                    <li class="nav-item"><a class="nav-link" href="#/reports">Звіти</a></li>
                    {% endif %}
                    
                    <li class="nav-item"><a class="nav-link" href="#/dictionaries">Довідники</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Вихід</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="app"></div>
    </div>
    <script>
        window.IS_ADMIN = ("{{ user.is_staff|yesno:'true,false' }}" === "true") || ("{{ user.is_superuser|yesno:'true,false' }}" === "true");
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/patients.js' %}"></script>
    <script src="{% static 'js/requests.js' %}"></script>
    <script src="{% static 'js/appointments.js' %}"></script>
    <script src="{% static 'js/reports.js' %}"></script>
    <script src="{% static 'js/dictionaries.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
